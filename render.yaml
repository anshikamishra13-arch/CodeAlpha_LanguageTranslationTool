services:
  # Backend Service
  - type: web
    name: linguaai-backend
    runtime: node
    startCommand: npm run prod
    buildCommand: npm install
    dir: ./backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    healthCheckPath: /api/health
    
  # Frontend Service  
  - type: web
    name: linguaai-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    dir: ./Frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          name: linguaai-backend
          property: url
      - key: VITE_APP_ENV
        value: production

  # Redis (optional - for session caching)
  # - type: redis
  #   name: linguaai-cache
  #   plan: free

databases:
  # MongoDB (if using MongoDB Atlas, this is optional)
  # Recommended: Use MongoDB Atlas for free tier
  # - name: linguaai-db
  #   engine: mongodb
  #   plan: free
