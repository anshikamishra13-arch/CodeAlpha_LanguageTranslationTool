version: "3.9"

# ─────────────────────────────────────────────────────────────
#  LinguaAI – Docker Compose
#
#  Usage:
#    Development:   docker compose up --build
#    Production:    docker compose -f docker-compose.yml up -d
#
#  Required: copy .env.example → .env and fill in your values
# ─────────────────────────────────────────────────────────────

services:

  # ── Backend (Node.js / Express) ─────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: linguaai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # ── Loaded from .env file ──
      MONGO_URI: ${MONGO_URI}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:80}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - linguaai-net

  # ── Frontend (React + Nginx) ─────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        # Points to the backend service inside Docker network
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: linguaai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - linguaai-net

networks:
  linguaai-net:
    driver: bridge
